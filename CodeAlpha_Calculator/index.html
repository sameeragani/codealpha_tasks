<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculator</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS File -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Calculator Section -->

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="calculator-box">

            <!-- Heading -->

            <h2 class="text-center mb-4">
                Calculator
            </h2>

            <!-- Display Screen -->

            <input type="text"
            id="display"
            class="form-control mb-3 text-end"
            readonly>

            <!-- Buttons -->

            <div class="row g-2">

                <!-- Row 1 -->

                <div class="col-3">
                    <button class="btn btn-secondary calc-btn"
                    onclick="clearDisplay()">
                        C
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-dark calc-btn"
                    onclick="appendValue('/')">
                        ÷
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-dark calc-btn"
                    onclick="appendValue('*')">
                        ×
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-dark calc-btn"
                    onclick="appendValue('-')">
                        −
                    </button>
                </div>

                <!-- Row 2 -->

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('7')">
                        7
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('8')">
                        8
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('9')">
                        9
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-dark calc-btn"
                    onclick="appendValue('+')">
                        +
                    </button>
                </div>

                <!-- Row 3 -->

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('4')">
                        4
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('5')">
                        5
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('6')">
                        6
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-primary calc-btn"
                    onclick="calculateResult()">
                        =
                    </button>
                </div>

                <!-- Row 4 -->

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('1')">
                        1
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('2')">
                        2
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('3')">
                        3
                    </button>
                </div>

                <div class="col-3">
                    <button class="btn btn-light calc-btn"
                    onclick="appendValue('.')">
                        .
                    </button>
                </div>

                <!-- Row 5 -->

                <div class="col-12">
                    <button class="btn btn-light calc-btn w-100"
                    onclick="appendValue('0')">
                        0
                    </button>
                </div>

            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript File -->

    <script src="script.js"></script>

</body>

</html>
