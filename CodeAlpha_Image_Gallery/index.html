<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Gallery</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Heading -->

    <div class="container text-center mt-4">

        <h1 class="main-heading">
            Image Gallery
        </h1>

        <p class="sub-heading">
            A modern responsive gallery with smooth interactions
        </p>

    </div>

    <!-- Filter Buttons -->

    <div class="container text-center mt-4">

        <button class="btn btn-dark filter-btn"
        onclick="filterImages('all')">

            All

        </button>

        <button class="btn btn-success filter-btn"
        onclick="filterImages('nature')">

            Nature

        </button>

        <button class="btn btn-primary filter-btn"
        onclick="filterImages('animals')">

            Animals

        </button>

        <button class="btn btn-warning filter-btn"
        onclick="filterImages('travel')">

            Travel

        </button>

    </div>

    <!-- Image Gallery -->

    <div class="container mt-5">

        <div class="row g-4">

            <!-- Image 1 -->

            <div class="col-md-4 gallery-item nature">

                <img src="https://picsum.photos/id/1015/600/400"
                class="gallery-img"
                onclick="openLightbox(0)">

            </div>

            <!-- Image 2 -->

            <div class="col-md-4 gallery-item animals">

                <img src="https://picsum.photos/id/1025/600/400"
                class="gallery-img"
                onclick="openLightbox(1)">

            </div>

            <!-- Image 3 -->

            <div class="col-md-4 gallery-item travel">

                <img src="https://picsum.photos/id/1043/600/400"
                class="gallery-img"
                onclick="openLightbox(2)">

            </div>

            <!-- Image 4 -->

            <div class="col-md-4 gallery-item nature">

                <img src="https://picsum.photos/id/1056/600/400"
                class="gallery-img"
                onclick="openLightbox(3)">

            </div>

            <!-- Image 5 -->

            <div class="col-md-4 gallery-item animals">

                <img src="https://picsum.photos/id/237/600/400"
                class="gallery-img"
                onclick="openLightbox(4)">

            </div>

            <!-- Image 6 -->

            <div class="col-md-4 gallery-item travel">

                <img src="https://picsum.photos/id/1068/600/400"
                class="gallery-img"
                onclick="openLightbox(5)">

            </div>

        </div>

    </div>

    <!-- Lightbox -->

    <div class="lightbox" id="lightbox">

        <span class="close-btn"
        onclick="closeLightbox()">

            &times;

        </span>

        <button class="prev-btn"
        onclick="prevImage()">

            ❮

        </button>

        <img id="lightbox-img">

        <button class="next-btn"
        onclick="nextImage()">

            ❯

        </button>

    </div>

    <!-- JavaScript File -->

    <script src="script.js"></script>

</body>

</html>
